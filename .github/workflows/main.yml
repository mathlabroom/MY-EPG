name: EPG Merger
on:
  schedule:
    # 每天北京时间 07:40, 13:40, 19:40, 01:40 运行
    # 这样可以完美错开大部分机顶盒默认的整点抓取时间
    - cron: '40 23,5,11,17 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
 build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run Merge
        run: |
          pip install requests
          python merge.py
          ls -l  # <--- 这行是关键，它会打印出当前目录下的所有文件，帮你检查 guide.xml 是否真的生成了
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
 deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # 升级到 v4，解决 Node.js 兼容问题
